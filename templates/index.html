<!DOCTYPE html>
<html>

<head>
    <title>web2rss</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        code {
            display: block;
            width: 100%;
            overflow: auto;
            background-color: #1a1a1a;
            padding: 1rem;
            border-radius: 0.5rem;
            margin: 1rem 0;
        }

        .loading {
            width: 6rem;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .w-60vw {
            width: 60vw;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .5;
            }
        }

        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .hover-scale {
            transition: transform 0.2s ease-in-out;
        }

        .hover-scale:hover {
            transform: scale(1.02);
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .table-container {
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .input-focus {
            transition: all 0.3s ease;
        }

        .input-focus:focus {
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
        }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-K8047MQ757"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-K8047MQ757');
    </script>
</head>

<body class="relative bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 min-h-screen">

    <div class="flex justify-end py-6 px-6">
        <a href="https://github.com/weekend-project-space/web2rss" class="hover-scale">
            <img src="https://img.shields.io/github/stars/weekend-project-space/web2rss.svg?style=social&label=Stars"
                alt="">
        </a>
    </div>

    <div id="app" class="py-16 sm:py-24 lg:py-32">
        <div class="mx-auto max-w-3xl px-6 lg:px-8">
            <!-- <div class="mx-auto flex justify-center"> -->
            <div class="text-center">
                <img class="mx-auto mb-8 hover-scale" style="width: 50px;" src="/static/logo.png" alt="">
                <h2 class="text-4xl font-bold tracking-tight text-white sm:text-5xl mb-4">Web to RSS</h2>
                <p class="mt-4 text-lg leading-8 text-gray-300" v-text="$t('subtitle')"></p>
                <div class="mt-8 flex gap-4">
                    <label for="url" class="sr-only">url</label>
                    <input id="url" name="text" type="text" autocomplete="text" required
                        class="input-focus min-w-0 flex-auto rounded-xl border-0 bg-white/5 px-4 py-3 text-white shadow-sm ring-1 ring-inset ring-white/10 focus:ring-2 focus:ring-inset focus:ring-indigo-500 sm:text-sm sm:leading-6"
                        :placeholder="$t('input')" v-model="text" @keyup.enter="gen">
                    <button v-if="loading" disabled type="button"
                        class="py-3 px-6 text-sm font-medium text-gray-900 bg-white rounded-xl border border-gray-200 hover:bg-gray-100 hover:text-blue-700 focus:z-10 focus:ring-4 focus:outline-none focus:ring-blue-700 focus:text-blue-700 dark:bg-gray-800 dark:text-gray-400 dark:border-gray-600 dark:hover:text-white dark:hover:bg-gray-700 inline-flex items-center transition-all duration-200">
                        <svg aria-hidden="true" role="status"
                            class="inline w-4 h-4 me-3 text-gray-200 animate-spin dark:text-gray-600"
                            viewBox="0 0 100 101" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M100 50.5908C100 78.2051 77.6142 100.591 50 100.591C22.3858 100.591 0 78.2051 0 50.5908C0 22.9766 22.3858 0.59082 50 0.59082C77.6142 0.59082 100 22.9766 100 50.5908ZM9.08144 50.5908C9.08144 73.1895 27.4013 91.5094 50 91.5094C72.5987 91.5094 90.9186 73.1895 90.9186 50.5908C90.9186 27.9921 72.5987 9.67226 50 9.67226C27.4013 9.67226 9.08144 27.9921 9.08144 50.5908Z"
                                fill="currentColor" />
                            <path
                                d="M93.9676 39.0409C96.393 38.4038 97.8624 35.9116 97.0079 33.5539C95.2932 28.8227 92.871 24.3692 89.8167 20.348C85.8452 15.1192 80.8826 10.7238 75.2124 7.41289C69.5422 4.10194 63.2754 1.94025 56.7698 1.05124C51.7666 0.367541 46.6976 0.446843 41.7345 1.27873C39.2613 1.69328 37.813 4.19778 38.4501 6.62326C39.0873 9.04874 41.5694 10.4717 44.0505 10.1071C47.8511 9.54855 51.7191 9.52689 55.5402 10.0491C60.8642 10.7766 65.9928 12.5457 70.6331 15.2552C75.2735 17.9648 79.3347 21.5619 82.5849 25.841C84.9175 28.9121 86.7997 32.2913 88.1811 35.8758C89.083 38.2158 91.5421 39.6781 93.9676 39.0409Z"
                                fill="#1C64F2" />
                        </svg>
                        <span v-text="$t('btn')"></span>
                    </button>
                    <button v-else type="submit" @click="gen"
                        class="flex-none rounded-xl bg-indigo-600 px-6 py-3 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500 transition-all duration-200 hover-scale"
                        v-text="$t('btn')"></button>
                </div>
                <!-- </div> -->
            </div>

            <div v-if="loading" class="flex justify-center my-8">
                <svg class="loading" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="0" fill="white">
                        <animate attributeName="r" values="10;30;10" dur="1s" repeatCount="indefinite" />
                    </circle>
                </svg>
            </div>

            <div v-else-if="data.length" class="table-container glass-effect my-12">
                <table class="border-collapse table-auto w-full text-sm">
                    <thead>
                        <tr class="bg-gray-800/50">
                            <th class="border-b border-gray-700 font-medium p-4 text-gray-300 text-left"
                                v-text="$t('source')">
                            </th>
                            <th class="border-b border-gray-700 font-medium p-4 text-gray-300 text-left"
                                v-text="$t('match')">
                            </th>
                            <th class="border-b border-gray-700 font-medium p-4 text-gray-300 text-left"
                                v-text="$t('preview')">
                            </th>
                            <th class="border-b border-gray-700 font-medium p-4 text-gray-300 text-left"
                                v-text="$t('feed')">
                            </th>
                        </tr>
                    </thead>
                    <tbody class="bg-gray-900/30">
                        <tr v-for="item in data" :key="item.feed"
                            class="hover:bg-gray-800/30 transition-colors duration-200">
                            <td class="border-b border-gray-700 p-4 text-gray-300" v-text="item.source">
                            </td>
                            <td class="max-w-56 break-all border-b border-gray-700 p-4 text-gray-300" v-text="item.url">
                            </td>
                            <td
                                class="border-b border-gray-700 p-4 text-indigo-400 hover:text-indigo-300 transition-colors duration-200">
                                <p v-if="item.source=='remote'" @click="pullRoute" class="cursor-pointer">-</p>
                                <a v-else-if="item.source=='local'" target="_blank" :href="item.feed+'?preview=true'"
                                    class="hover:underline">feed preview</a>
                            </td>
                            <td
                                class="border-b border-gray-700 p-4 text-indigo-400 hover:text-indigo-300 transition-colors duration-200">
                                <p v-if="item.source=='remote'" @click="pullRoute" class="cursor-pointer">pull</p>
                                <a v-else-if="item.source=='local'" target="_blank" :href="item.feed"
                                    class="hover:underline">feed</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div v-else-if="code" class="glass-effect rounded-xl p-6 my-8">
                <div class="flex justify-center gap-4 my-6">
                    <button v-text="$t('testBtn')" @click="run"
                        class="flex-none rounded-xl bg-emerald-600 px-6 py-3 text-sm font-semibold text-white shadow-sm hover:bg-emerald-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-emerald-500 transition-all duration-200 hover-scale">
                        ⎙
                    </button>
                    <button v-text="$t('useBtn')" @click="saveRoute"
                        class="flex-none rounded-xl bg-indigo-600 px-6 py-3 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500 transition-all duration-200 hover-scale">
                        ✓
                    </button>
                </div>
                <div id="coderef" class="text-white bg-gray-900/50 px-4 py-4 rounded-xl" v-html="mark(code)"></div>
                <div class="w-full my-6 glass-effect rounded-xl overflow-hidden">
                    <div class="p-4">
                        <label for="comment" class="sr-only">Describe the problem you encountered</label>
                        <textarea v-model="value" rows="4"
                            class="w-full px-4 py-3 text-sm text-gray-300 bg-gray-800/50 border-0 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all duration-200"
                            :placeholder="$t('prompt')" required></textarea>
                    </div>
                    <div class="flex items-center justify-end px-4 py-3 border-t border-gray-700">
                        <button v-text="$t('btn')" type="submit" @click="chatGenCode"
                            class="inline-flex items-center px-6 py-2.5 text-sm font-medium text-center text-white bg-indigo-600 rounded-xl hover:bg-indigo-500 focus:ring-4 focus:ring-indigo-500 transition-all duration-200 hover-scale">
                        </button>
                    </div>
                </div>
            </div>

            <div class="py-8 text-center">
                <div class="text-indigo-400 hover:text-indigo-300 cursor-pointer transition-colors duration-200"
                    @click="loadData('*')" v-text="$t('all')">
                </div>
            </div>
        </div>
    </div>

    <div class="absolute left-1/2 top-0 -z-10 -translate-x-1/2 blur-3xl xl:-top-6" aria-hidden="true">
        <div class="aspect-[1155/678] w-60vw bg-gradient-to-tr from-indigo-500 to-purple-600 opacity-30"
            style="clip-path: polygon(74.1% 44.1%, 100% 61.6%, 97.5% 26.9%, 85.5% 0.1%, 80.7% 2%, 72.5% 32.5%, 60.2% 62.4%, 52.4% 68.1%, 47.5% 58.3%, 45.2% 34.5%, 27.5% 76.7%, 0.1% 64.9%, 17.9% 100%, 27.6% 76.8%, 76.1% 97.7%, 74.1% 44.1%)">
        </div>
    </div>
    <script type="importmap">
        { 
            "imports": {
                "vue": "https://unpkg.com/vue@3/dist/vue.esm-browser.js"
            } 
        }
    </script>
    <script type="module">
        import { createApp, ref, onMounted } from 'vue'
        import { createI18n, useI18n } from 'https://unpkg.com/vue-i18n@9/dist/vue-i18n.esm-browser.js'



        const app = createApp({
            setup() {
                const text = ref('')
                const code = ref('')
                const data = ref([])
                const loading = ref(false)
                const value = ref('')
                let messages = []
                async function useLoading(fun) {
                    loading.value = true
                    try {
                        await fun()
                    } catch (e) {
                        console.error(e)
                    }
                    loading.value = false
                }
                async function gen() {
                    useLoading(async () => {
                        await loadData()
                        if (!data.value.length) {
                            await genPyCode()
                        }
                    })
                }
                async function loadData(q) {
                    data.value = []
                    data.value = await fetch(`/feed?url=${q || text.value}`).then(response => response.json())
                }
                function chatGenCode() {
                    code.value = ''
                    useLoading(async () => {
                        const d = [...messages, { "role": "user", "content": value.value + "\n 请重新生成，只生成代码" }]
                        await genPyCode(d)
                    })
                }
                async function genPyCode(messages0) {
                    let data = {
                        url: text.value,
                        messages: messages0
                    }
                    messages = await fetch('/chat', {
                        method: 'POST', // 请求方法
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(data)
                    }).then(response => response.json())
                    code.value = messages[messages.length - 1].content
                }
                function mark(text) {
                    return marked.parse(text)
                }
                async function run() {
                    const fun = document.querySelector('#coderef').innerText
                    // 定义要发送的数据
                    const data = {
                        fun: fun,
                    };
                    // 使用 fetch 发送 POST 请求
                    let responseText = await fetch('/call', {
                        method: 'POST', // 请求方法
                        headers: {
                            'Content-Type': 'application/json' // 设置请求头，表明发送 JSON 数据
                        },
                        body: JSON.stringify(data) // 将 JavaScript 对象转换为 JSON 字符串
                    }).then(response => response.text())
                    // 创建一个 Blob 对象，并设置 MIME 类型为 'application/xml'
                    const blob = new Blob([responseText], { type: 'application/xml' });
                    // 创建一个指向 Blob 对象的 URL
                    const url = URL.createObjectURL(blob);
                    // 在新窗口中打开这个 URL
                    window.open(url);
                }
                function pullRoute() {
                    useLoading(async () => {
                        const key = text.value.split('://')[1]

                        await fetch(`/route/${key}`, {
                            method: 'POST', // 请求方法
                            headers: {
                                'Content-Type': 'application/json' // 设置请求头，表明发送 JSON 数据
                            }
                        }).then(response => response.text())
                        loadData()
                    })
                }
                function saveRoute() {
                    useLoading(async () => {
                        const fun = document.querySelector('#coderef').innerText
                        // 定义要发送的数据
                        const data = {
                            fun: fun,
                            url: text.value,
                            key: text.value.split('://')[1]
                        };
                        try {
                            await fetch('/route', {
                                method: 'POST', // 请求方法
                                headers: {
                                    'Content-Type': 'application/json' // 设置请求头，表明发送 JSON 数据
                                },
                                body: JSON.stringify(data) // 将 JavaScript 对象转换为 JSON 字符串
                            }).then(response => response.text())
                            loadData()
                        } catch (e) {
                            alert(e)
                        }
                    })
                }
                onMounted(() => {
                    setTimeout(() => {
                        document.querySelector('input').focus()
                    }, 300)
                })
                return {
                    text,
                    data,
                    code,
                    loading,
                    value,
                    gen,
                    run,
                    saveRoute,
                    pullRoute,
                    mark,
                    chatGenCode,
                    loadData,
                }
            }
        })
        const i18n = createI18n({
            locale: 'cn',
            fallbackLocale: 'en',
            messages: {
                en: {
                    subtitle: 'Convert your favorite webpage list to RSS through LLM driver for your convenience.',
                    input: 'enter website',
                    btn: 'generate',
                    soure: 'soure',
                    match: 'match',
                    feed: 'feed',
                    preview: 'preview',
                    all: 'view all',
                    testBtn: 'test',
                    useBtn: 'use',
                    prompt: 'Describe the problem you encountered'
                },
                cn: {
                    subtitle: '通过AI驱动将您喜欢的网页列表转换为RSS，以方便您使用。',
                    input: '输入要转换的网址',
                    btn: '开始转化',
                    soure: '来源',
                    match: '网址',
                    feed: 'feed',
                    preview: '详情',
                    all: '查看所有',
                    testBtn: '测试效果',
                    useBtn: '就它了',
                    prompt: '你应该这样做'
                }
            }
        })
        app.use(i18n)
        app.mount('#app')
    </script>
</body>

</html>
